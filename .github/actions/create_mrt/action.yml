name: create_mrt
inputs:
  mobify_user:
    description: "Mobify user email"
  mobify_api_key:
    description: "Mobify user API key"
  cwd:
    required: false
    default: ${{ github.workspace }}
  cloud_origin:
      description: 'MRT Cloud origin'
      required: false
      default: 'https://cloud.mobify.com'
runs:
  using: composite
  steps:
    - name: Create MRT credentials file
      working-directory: ${{ inputs.cwd }}
      run: |-
        # Add credentials file at ~/.mobify so we can upload to Mobify Cloud
        npm run save-credentials --prefix packages/template-retail-react-app -- --user "${{inputs.mobify_user}}" --key "${{inputs.mobify_api_key}}" --cloud-origin "${{inputs.cloud_origin}}"
      shell: bash
