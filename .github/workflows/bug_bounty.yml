name: SalesforceCommerceCloud/pwa-kit/bug_bounty
on:
  push:
    branches:
      - 'mrt-test-ci-deploy'

jobs:
  deploy-bug-bounty:
    runs-on: ubuntu-latest
    env:
      IS_LATEST_RELEASE: ${{ (git tag | sort --version-sort | tail -n1) == github.ref_name }}
    steps:
      - name: "Check if latest release"
        id: set-latest-tag
        run: echo "${env.IS_LATEST_RELEASE}"

